<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="Cosmos Repository"
>
  <defs>
    <radialGradient id="cosmos-planet" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="55%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </radialGradient>
    <linearGradient id="cosmos-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc" />
      <stop offset="55%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0e7490" />
    </linearGradient>
  </defs>

  <!-- Ring (back arc — behind the planet) -->
  <g transform="rotate(-22 32 32)">
    <path
      d="M 7 32 A 25 8.5 0 0 1 57 32"
      fill="none"
      stroke="url(#cosmos-ring)"
      stroke-width="3.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Planet -->
  <circle cx="32" cy="32" r="16" fill="url(#cosmos-planet)" />

  <!-- Highlight -->
  <ellipse cx="27" cy="26" rx="5.5" ry="3" fill="#ffffff" opacity="0.32" />

  <!-- Ring (front arc — in front of the planet) -->
  <g transform="rotate(-22 32 32)">
    <path
      d="M 7 32 A 25 8.5 0 0 0 57 32"
      fill="none"
      stroke="url(#cosmos-ring)"
      stroke-width="3.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Sparkles -->
  <path
    d="M51 12 l1.1 -3 l1.1 3 l3 1.1 l-3 1.1 l-1.1 3 l-1.1 -3 l-3 -1.1z"
    fill="#67e8f9"
  />
  <path
    d="M11 51 l0.8 -2.2 l0.8 2.2 l2.2 0.8 l-2.2 0.8 l-0.8 2.2 l-0.8 -2.2 l-2.2 -0.8z"
    fill="#67e8f9"
  />
</svg>
